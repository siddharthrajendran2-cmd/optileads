services:
  - type: web
    name: optileads
    runtime: python
    buildCommand: "cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
